<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통화 STT 뷰어</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
    }

    /* ── Header (1줄 압축) ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 44px;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px; font-weight: 600; white-space: nowrap;
    }
    #conv-title {
      font-size: 11px; opacity: 0.45; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 260px;
    }
    .header-sep {
      width: 1px; height: 18px; background: rgba(255,255,255,0.15); flex-shrink: 0;
    }
    .header-tabs { display: flex; gap: 2px; }
    .tab-btn {
      padding: 5px 12px;
      border: none; border-radius: 5px;
      cursor: pointer;
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.45);
      background: transparent;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .tab-btn:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.07); }
    .tab-btn.active { color: #fff; background: rgba(255,255,255,0.12); }
    #edit-count {
      font-size: 11px; color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08); border-radius: 10px;
      padding: 2px 9px; white-space: nowrap; flex-shrink: 0;
      display: none;
    }
    #edit-count.has-edits { color: #7eff7e; background: rgba(126,255,126,0.12); }
    .header-legend {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; color: rgba(255,255,255,0.45);
      margin-left: auto; flex-shrink: 0;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.left  { background: #b0b5be; }
    .legend-dot.right { background: #4a90d9; }
    .legend-dot.chip  { background: transparent; border: 1.5px dashed rgba(255,255,255,0.35); }

    /* ── Audio bar ── */
    .audio-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: #1a1a2e;
      color: white;
      font-size: 12px;
    }
    #play-btn {
      background: #e94560;
      border: none;
      color: white;
      font-size: 14px;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #play-btn:hover { background: #c73853; }
    .audio-label { opacity: 0.6; white-space: nowrap; font-size: 11px; }
    #progress-wrap {
      flex: 1;
      min-width: 100px;
      height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    #progress-fill {
      height: 100%;
      background: #e94560;
      border-radius: 3px;
      width: 0%;
      pointer-events: none;
      transition: width 0.1s linear;
    }
    #audio-time {
      font-size: 11px;
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* ── Chat panels ── */
    .chat-panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .chat-panel.active { display: block; }

    /* ── Bubbles ── */
    .message-row {
      display: flex;
      margin-bottom: 6px;
    }
    .message-row.left { justify-content: flex-start; }
    .message-row.right { justify-content: flex-end; }

    .bubble {
      max-width: 68%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      transition: all 0.15s;
      word-break: keep-all;
    }
    .bubble.left {
      background: #fff;
      border: 1px solid #e8e8ec;
      border-top-left-radius: 4px;
    }
    .bubble.right {
      background: #0f3460;
      color: #fff;
      border-top-right-radius: 4px;
    }
    .bubble.playing {
      outline: 2.5px solid #e94560;
      outline-offset: 1px;
    }
    .bubble .time {
      display: block;
      font-size: 10px;
      opacity: 0.4;
      margin-top: 4px;
      text-align: right;
    }

    /* ── 글자 단위 클릭 가능 word span ── */
    .wp {
      cursor: pointer;
      border-radius: 3px;
      padding: 0 1px;
      transition: all 0.12s;
    }
    .wp:hover {
      background: rgba(233, 69, 96, 0.15);
    }
    .bubble.right .wp:hover {
      background: rgba(255,255,255,0.15);
    }
    .wp.wp-playing {
      background: rgba(233, 69, 96, 0.3);
      font-weight: 600;
    }
    .bubble.right .wp.wp-playing {
      background: rgba(255,255,255,0.25);
      font-weight: 600;
    }

    /* ── 인라인 추임새 칩 (6번 탭) ── */
    .interjection-chip-row {
      display: flex;
      justify-content: flex-start;
      margin: 2px 0;
    }
    .interjection-chip-row.from-right {
      justify-content: flex-end;
    }
    .interjection-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      color: #888;
      background: rgba(0,0,0,0.04);
      border: 1px dashed #d0d3d8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .interjection-chip:hover { background: rgba(0,0,0,0.08); color: #555; }
    .interjection-chip.playing { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.06); }
    .interjection-chip .chip-speaker { font-weight: 600; font-size: 10px; opacity: 0.7; }
    .interjection-chip .chip-time { font-size: 9px; opacity: 0.45; margin-left: 4px; }

    .inline-interject {
      display: inline;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 1px 6px;
      margin: 0 2px;
      border: 1px dashed rgba(255,255,255,0.2);
      white-space: nowrap;
    }
    .bubble.left .inline-interject {
      color: rgba(0,0,0,0.4);
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.15);
    }

    /* ── Edit tab ── */
    .edit-bubble-row { display: flex; margin-bottom: 6px; }
    .edit-bubble-row.left { justify-content: flex-start; }
    .edit-bubble-row.right { justify-content: flex-end; }
    .edit-bubble {
      max-width: 68%; padding: 10px 14px;
      border-radius: 18px; font-size: 14px; line-height: 1.65;
      border: 1px solid transparent; transition: all 0.15s;
      word-break: keep-all;
    }
    .edit-bubble.left { background: #fff; border-color: #e8e8ec; border-top-left-radius: 4px; }
    .edit-bubble.right { background: #0f3460; color: #fff; border-top-right-radius: 4px; }
    .edit-word {
      cursor: pointer; border-radius: 3px; padding: 0 1px;
      border: 1.5px solid transparent; transition: all 0.12s;
    }
    .edit-word:hover { background: rgba(233,69,96,0.12); }
    .edit-bubble.right .edit-word:hover { background: rgba(255,255,255,0.15); }
    .edit-word.focused { border-color: #e94560; background: rgba(233,69,96,0.08); }
    .edit-bubble.right .edit-word.focused { background: rgba(233,69,96,0.25); }
    .edit-word.modified { color: #1a7a1a; }
    .edit-bubble.right .edit-word.modified { color: #7eff7e; }
    .edit-word.ew-playing { background: rgba(233,69,96,0.3); font-weight: 600; }
    .edit-bubble.right .edit-word.ew-playing { background: rgba(255,255,255,0.25); font-weight: 600; }
    .edit-word-input {
      border: none; border-bottom: 1.5px solid #e94560;
      background: transparent; font-size: 14px; font-family: inherit;
      color: inherit; outline: none; padding: 0 1px;
    }
    .edit-time { display: block; font-size: 10px; opacity: 0.4; margin-top: 4px; text-align: right; }

    /* Scrollbar */
    .chat-panel::-webkit-scrollbar { width: 6px; }
    .chat-panel::-webkit-scrollbar-track { background: transparent; }
    .chat-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>

  <!-- ── Sidebar styles ── -->
  <style>
    body { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px; flex-shrink: 0;
      background: #16213e;
      display: flex; flex-direction: column;
      height: 100vh;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-top {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #folder-btn {
      width: 100%; padding: 8px;
      background: #e94560; border: none; color: #fff;
      font-size: 12px; font-weight: 600; border-radius: 6px;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    #folder-btn:hover { background: #c73853; }
    #conv-list {
      flex: 1; overflow-y: auto; padding: 6px;
    }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .conv-item {
      padding: 9px 10px; border-radius: 6px;
      color: rgba(255,255,255,0.6); font-size: 11px;
      cursor: pointer; transition: all 0.15s;
      margin-bottom: 2px; word-break: break-all; line-height: 1.4;
    }
    .conv-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .conv-item.active { background: rgba(255,255,255,0.14); color: #fff; }
    .no-conv { color: rgba(255,255,255,0.35); font-size: 11px; text-align: center; padding: 16px 8px; }

    /* ── Main area ── */
    #main {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; min-width: 0;
      background: #f5f6f8;
    }

    /* ── Placeholder ── */
    #placeholder {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: 13px;
    }
    #placeholder.hidden { display: none; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <div class="sidebar-top">
    <button id="folder-btn" onclick="openFolderPicker()">폴더 열기</button>
  </div>
  <div id="conv-list">
    <p class="no-conv">폴더를 선택하세요</p>
  </div>
</div>

<!-- ── Main ── -->
<div id="main">
  <header>
    <span class="header-title">STT 뷰어</span>
    <span id="conv-title"></span>
    <div class="header-sep"></div>
    <div class="header-tabs">
      <button class="tab-btn active" data-tab="wordpiece">Word-piece</button>
      <button class="tab-btn" data-tab="inline-chip">인라인 병합</button>
      <button class="tab-btn" data-tab="edit">편집</button>
    </div>
    <span id="edit-count"></span>
    <div class="header-legend">
      <div class="legend-item"><div class="legend-dot left"></div><span>고객</span></div>
      <div class="legend-item"><div class="legend-dot right"></div><span>상담사</span></div>
      <div class="legend-item"><div class="legend-dot chip"></div><span>추임새</span></div>
    </div>
  </header>

  <div class="audio-bar">
    <button id="play-btn" onclick="togglePlay()" title="재생/일시정지">▶</button>
    <span class="audio-label" id="audio-label">-</span>
    <div id="progress-wrap" onclick="seekAudio(event)">
      <div id="progress-fill"></div>
    </div>
    <span id="audio-time">00:00 / --:--</span>
    <audio id="audio-player" preload="auto"></audio>
  </div>

  <div id="placeholder">대화를 선택하세요</div>
  <div class="chat-panel" id="panel-wordpiece"></div>
  <div class="chat-panel" id="panel-inline-chip"></div>
  <div class="chat-panel" id="panel-edit"></div>
</div>


<script src="stt-editor.js"></script>
</body>
</html>
